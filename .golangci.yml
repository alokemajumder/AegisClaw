run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - bodyclose
    - gosec
    - misspell
    - unconvert

linters-settings:
  gosec:
    excludes:
      - G104  # Audit errors not checked (too noisy for stubs)
  govet:
    enable-all: true
    disable:
      - shadow

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
    - path: testutil/
      linters:
        - gosec
  max-issues-per-linter: 50
  max-same-issues: 5
