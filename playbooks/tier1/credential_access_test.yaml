id: tier1-credential-access-test
name: Credential Access Detection Test
description: Simulate a benign LSASS access pattern to test credential access detection capabilities
tier: 1
technique_id: "T1003.001"
asset_types:
  - endpoint
  - server
tags:
  - detection-test
  - credential-access
  - lsass
steps:
  - name: Simulate LSASS access pattern
    agent_type: executor
    action: simulate_lsass_access
    description: Perform a benign process handle request against LSASS with suspicious access rights to trigger credential access detection
    inputs:
      access_type: benign_handle_request
      target_process: lsass.exe
      access_rights: "PROCESS_QUERY_INFORMATION"
      description: "Benign LSASS access pattern for detection testing"
    expected_telemetry:
      source: edr
      event_type: process_access
      search_query: "lsass.exe PROCESS_QUERY_INFORMATION"
      max_latency_sec: 60
      indicators:
        target_process: lsass.exe
        action: process_access
    cleanup:
      action: terminate_process
      description: Terminate the benign test process that accessed LSASS
      inputs:
        process_name: aegisclaw_cred_test
    timeout_seconds: 60
  - name: Verify credential access alert
    agent_type: detection_evaluator
    action: verify_detection
    description: Check that the EDR raised a credential access alert for the LSASS access pattern
    inputs:
      check_type: alert_fired
      expected_severity: high
      expected_technique: "T1003.001"
      max_latency_sec: 60
    timeout_seconds: 120
  - name: Verify cleanup
    agent_type: executor
    action: verify_cleanup
    description: Confirm the benign credential access test process has been terminated
    inputs:
      process_name: aegisclaw_cred_test
    timeout_seconds: 30
