# AegisClaw Configuration
#
# This file provides NON-SENSITIVE defaults for local development.
# All sensitive values (passwords, secrets, keys) MUST be provided via
# environment variables in production. Viper reads env vars with the
# AEGISCLAW_ prefix, e.g.:
#   AEGISCLAW_DATABASE_PASSWORD  -> database.password
#   AEGISCLAW_AUTH_JWT_SECRET    -> auth.jwt_secret
#   AEGISCLAW_MINIO_ACCESS_KEY   -> minio.access_key
#   AEGISCLAW_MINIO_SECRET_KEY   -> minio.secret_key
#
# See .env.example for the full list of supported environment variables.

server:
  api_port: 8080
  grpc_base_port: 9090

database:
  host: localhost
  port: 5432
  user: aegisclaw
  name: aegisclaw
  ssl_mode: disable
  max_conns: 25
  # password: provided via AEGISCLAW_DATABASE_PASSWORD env var

nats:
  url: nats://localhost:4222
  max_reconnects: 60
  reconnect_wait: 2s

minio:
  endpoint: localhost:9000
  bucket: aegisclaw-evidence
  use_ssl: false
  # access_key / secret_key: provided via AEGISCLAW_MINIO_ACCESS_KEY / SECRET_KEY env vars

ollama:
  url: http://localhost:11434
  default_model: llama3.1
  model_allowlist:
    - llama3.1
    - llama3.2
    - mistral
    - phi3
    - gemma2
    - qwen2.5
  timeout_seconds: 120

# NVIDIA NIM — optional high-performance LLM backend
# Enable for NVIDIA API Catalog, self-hosted DGX, or consumer RTX GPUs
# nvidia_nim:
#   enabled: false
#   url: https://integrate.api.nvidia.com/v1
#   api_key_ref: AEGISCLAW_NVIDIA_NIM_API_KEY
#   default_model: nvidia/nemotron-super-49b-v1
#   model_allowlist:
#     - nvidia/nemotron-nano-8b-v1       # RTX 4090/5090 (24GB) — SMB optimized
#     - nvidia/nemotron-super-49b-v1     # 2xRTX or A100 — best quality/cost
#     - nvidia/nemotron-ultra-253b-v1    # DGX — maximum reasoning
#     - meta/llama-3.3-70b-instruct
#   timeout_seconds: 120

# NeMo Guardrails — optional prompt safety layer via NVIDIA NeMo NIMs
# nemo_guardrails:
#   enabled: false
#   content_safety_url: http://localhost:8180/v1
#   jailbreak_url: http://localhost:8181/v1
#   topic_control_url: http://localhost:8182/v1
#   timeout_seconds: 10

auth:
  token_expiry: 15m
  refresh_expiry: 168h  # 7 days
  # jwt_secret: provided via AEGISCLAW_AUTH_JWT_SECRET env var
  sso:
    enabled: false
    provider: oidc
    issuer_url: ""
    client_id: ""
    client_secret: ""

policy:
  default_pack: default
  global_rate_limit: 100
  global_concurrency_cap: 20

observability:
  tracing_endpoint: localhost:4317
  metrics_port: 9100
  log_level: info
