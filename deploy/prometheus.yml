global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:9102"]

  - job_name: "orchestrator"
    static_configs:
      - targets: ["orchestrator:9102"]

  - job_name: "runner"
    static_configs:
      - targets: ["runner:9102"]

  - job_name: "evidence-service"
    static_configs:
      - targets: ["evidence-service:9102"]

  - job_name: "connector-service"
    static_configs:
      - targets: ["connector-service:9102"]

  - job_name: "reporting-service"
    static_configs:
      - targets: ["reporting-service:9102"]

  - job_name: "ollama-bridge"
    static_configs:
      - targets: ["ollama-bridge:9102"]

  - job_name: "scheduler"
    static_configs:
      - targets: ["scheduler:9102"]
